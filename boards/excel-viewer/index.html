<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Excel Viewer</title>
    <!-- Load order (per the boards-assets catalog): shared base → Tabulator vendor CSS →
         Persephone Tabulator skin (last, so it wins). -->
    <link rel="stylesheet" href="./board-base.css" />
    <link rel="stylesheet" href="./lib/tabulator.min.css" />
    <link rel="stylesheet" href="./lib/tabulator.css" />
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            display: flex;
            flex-direction: column;
            background: var(--p-bg, #1e1e1e);
            color: var(--p-text, #ddd);
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }
        #bar {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: var(--p-gap-md, 8px);
            padding: var(--p-space-sm, 6px) var(--p-space-md, 8px);
            /* Chrome = the app's titleBar/sideBar color (--p-bg-dark, Persephone 4.0.16+);
               falls back to the old --p-panel look on older versions. */
            background: var(--p-bg-dark, var(--p-panel, #252526));
            border-bottom: 1px solid var(--p-border, #3c3c3c);
            font-size: var(--p-font-base, 13px);
        }
        #name {
            flex: 0 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--p-text-muted, #9aa0a6);
        }
        /* Equal flex spacers on both sides of #tabs center the sheet tabs, with #name pinned
           left and the toolbar buttons pinned right. */
        .spacer { flex: 1 1 auto; min-width: 0; }
        /* Sheet tab bar — one tab per worksheet. Shrinks + scrolls horizontally when numerous. */
        #tabs {
            flex: 0 1 auto;
            min-width: 0;
            display: none;
            gap: 2px;
            overflow-x: auto;
        }
        #tabs.show { display: flex; }
        .tab {
            flex: 0 0 auto;
            font: inherit;
            font-size: var(--p-font-sm, 12px);
            cursor: pointer;
            padding: var(--p-space-xs, 3px) var(--p-space-md, 10px);
            border: 1px solid var(--p-border, #3c3c3c);
            border-radius: var(--p-radius-sm, 3px);
            background: transparent;
            color: var(--p-text-muted, #9aa0a6);
            white-space: nowrap;
        }
        .tab:hover { color: var(--p-text, #ddd); }
        .tab.active {
            /* Chip-active fill = --p-panel (the app's IconButton chip pattern); reads as a
               raised chip on the darker chrome bar. */
            background: var(--p-panel, #313131);
            color: var(--p-text, #ddd);
            border-color: var(--p-accent, #4c8bf5);
        }
        /* Toolbar icon actions — pinned right; disabled when nothing is loaded. Mirrors the
           drawio-viewer toolbar button styling (shared .tool-btn class). */
        .tool-btn {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: var(--p-space-xs, 4px);
            border: 1px solid var(--p-border, #3c3c3c);
            border-radius: var(--p-radius-sm, 3px);
            background: transparent;
            color: var(--p-text-muted, #9aa0a6);
        }
        .tool-btn svg { display: block; width: 16px; height: 16px; }
        /* Hover: neutral translucent — NOT --p-overlay (a modal scrim, 60% black). */
        .tool-btn:hover:not(:disabled) {
            background: rgba(128, 128, 128, 0.15);
            color: var(--p-text, #ddd);
        }
        .tool-btn:active:not(:disabled) { filter: brightness(0.9); }
        .tool-btn:disabled { opacity: 0.4; cursor: default; }
        /* Grid host — fills the remaining space; Tabulator renders into it. */
        #wrap {
            flex: 1 1 auto;
            position: relative;
            overflow: hidden;
        }
        #grid { position: absolute; inset: 0; }
        /* NOTE: Tabulator puts the `.tabulator` class on the #grid element ITSELF, not a child —
           so target `#grid` directly. `#grid .tabulator …` (descendant) matches nothing. */
        #grid.tabulator { height: 100%; }
        /* Grid header — Persephone's own grids (AVGrid) paint their header with the app's
           chrome color (--p-bg-dark), not the lighter panel color the Tabulator skin uses.
           Override the skin (the #grid id out-specifies its class selectors). */
        #grid .tabulator-header,
        #grid .tabulator-header .tabulator-col {
            background: var(--p-bg-dark, var(--p-panel, #252526));
        }
        /* Header-filter inputs stay input-colored (the app's input surface is --p-panel). */
        #grid .tabulator-header-filter input {
            background: var(--p-panel, #313131);
        }
        /* Row-number gutter — the frozen left column. Chrome-colored rail, matching the
           header, so it reads as an Excel row-number rail, not a data column. */
        #grid .xl-rownum {
            background: var(--p-bg-dark, var(--p-panel, #252526));
            color: var(--p-text-muted, #9aa0a6);
            font-size: var(--p-font-sm, 12px);
            user-select: none;
        }
        /* Uniform row background — disable the skin's even/odd zebra striping so the grid
           reads as a plain spreadsheet (all rows share the page background). */
        #grid .tabulator-row.tabulator-row-even {
            background-color: var(--p-bg, #1e1e1e);
        }
        /* State overlay — empty / error / loading messages. */
        #state {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--p-space-xl, 16px);
            color: var(--p-text-muted, #9aa0a6);
            background: var(--p-bg, #1e1e1e);
            pointer-events: none;
            white-space: pre-line;
        }
        #state.show { display: flex; }
        #state.error { color: var(--p-error, #f48771); }
    </style>
</head>
<body>
    <div id="bar">
        <span id="name">Excel Viewer</span>
        <div class="spacer"></div>
        <div id="tabs"></div>
        <div class="spacer"></div>
        <button id="reload" class="tool-btn" title="Reload the file from disk" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </button>
    </div>
    <div id="wrap">
        <div id="grid"></div>
        <div id="state"></div>
    </div>

    <!-- Vendored libraries (offline; CSP forbids remote network). Renderer then parser. -->
    <script src="./lib/tabulator.min.js"></script>
    <script src="./lib/xlsx.full.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
